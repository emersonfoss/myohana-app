name: CI

on:
  push:
    branches: [master, staging]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      SESSION_SECRET: ci-test-secret-key-1234567890abcdef

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run check

      - run: npm test

      - run: npm run build
